<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>POKEMON ARENA: 30th ANNIVERSARY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;1,700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root { --gold: #c89b3c; --blue: #005a82; --dark: #010a13; --text: #f0e6d2; --hp: #28ab44; }
    body { background-color: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; user-select: none; }
    .anniversary-glow { background: linear-gradient(to right, #c89b3c, #f0e6d2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(200, 155, 60, 0.5)); }
    .map-arena { height: calc(100vh - 160px); background: radial-gradient(circle, #0f1217 0%, #010a13 100%); position: relative; cursor: crosshair; overflow: hidden; }
    .bush { position: absolute; background: #05140a; border-radius: 50%; filter: blur(25px); opacity: 0.6; pointer-events: none; z-index: 5; }
    .champion { position: absolute; width: 85px; height: 85px; transform: translate(-50%, -50%); transition: left 0.4s cubic-bezier(0.1, 0.7, 0.1, 1), top 0.4s cubic-bezier(0.1, 0.7, 0.1, 1), opacity 0.3s; z-index: 20; }
    .stealth { opacity: 0.3; filter: brightness(0.4) saturate(0.5); }
    .projectile { position: absolute; width: 20px; height: 20px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 15px var(--gold); z-index: 15; transition: transform 0.1s linear; }
    .dummy { position: absolute; width: 60px; height: 60px; background: #32281e; border: 2px solid #5b5a56; border-radius: 10px; display: flex; align-items: center; justify-content: center; z-index: 10; font-size: 10px; font-weight: bold; color: #a09b8c; transition: all 0.2s; }
    .dummy.hit { background: #ff4d4d; border-color: white; transform: scale(1.2); }
    
    .hud { height: 160px; background: #010a13; border-top: 3px solid #32281e; display: flex; justify-content: center; align-items: center; gap: 40px; position: relative; }
    .skill-slot { width: 70px; height: 70px; background: #010a13; border: 2px solid #5b5a56; position: relative; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .skill-slot:hover { border-color: var(--gold); }
    .skill-key { position: absolute; bottom: -24px; font-size: 12px; font-weight: 900; color: #a09b8c; }
    .cd-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 22px; font-weight: 900; }
    .score-board { position: absolute; top: 20px; right: 30px; font-family: 'Fraunces'; font-size: 24px; color: var(--gold); }
    .slogan-banner { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 11px; tracking: 0.3em; opacity: 0.6; font-weight: bold; width: 100%; text-align: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const SLOGAN = "EVERY POKÉMON IS SOMEONE'S FAVORITE";
    
    // [기존 15종 멤버 복구 + 신규 멤버 통합]
    const POKEMONS = [
      { id: 25, name: "Pikachu", type: "Electric" }, { id: 133, name: "Eevee", type: "Normal" },
      { id: 1, name: "Bulbasaur", type: "Grass" }, { id: 4, name: "Charmander", type: "Fire" },
      { id: 7, name: "Squirtle", type: "Water" }, { id: 152, name: "Chikorita", type: "Grass" },
      { id: 155, name: "Cyndaquil", type: "Fire" }, { id: 158, name: "Totodile", type: "Water" },
      { id: 252, name: "Treecko", type: "Grass" }, { id: 255, name: "Torchic", type: "Fire" },
      { id: 258, name: "Mudkip", type: "Water" }, { id: 387, name: "Turtwig", type: "Grass" },
      { id: 390, name: "Chimchar", type: "Fire" }, { id: 393, name: "Piplup", type: "Water" },
      { id: 150, name: "Mewtwo", type: "Psychic" }, { id: 6, name: "Charizard", type: "Fire/Fly" },
      { id: 9, name: "Blastoise", type: "Water" }, { id: 3, name: "Venusaur", type: "Grass" },
      { id: 448, name: "Lucario", type: "Fight/Steel" }, { id: 94, name: "Gengar", type: "Ghost" },
      { id: 143, name: "Snorlax", type: "Normal" }, { id: 149, name: "Dragonite", type: "Dragon" },
      { id: 282, name: "Gardevoir", type: "Psychic" }, { id: 130, name: "Gyarados", type: "Water/Fly" },
      { id: 131, name: "Lapras", type: "Water/Ice" }, { id: 197, name: "Umbreon", type: "Dark" },
      { id: 384, name: "Rayquaza", type: "Dragon/Fly" }, { id: 470, name: "Leafeon", type: "Grass" },
      { id: 471, name: "Glaceon", type: "Ice" }, { id: 700, name: "Sylveon", type: "Fairy" }
    ].map(p => ({
        ...p,
        img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png`,
        cry: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/cries/latest/${p.id}.ogg`
    }));

    const GameApp = () => {
      const [hero, setHero] = useState(null);
      const [pos, setPos] = useState({ x: window.innerWidth/2, y: window.innerHeight/2 });
      const [isStealth, setIsStealth] = useState(false);
      const [cds, setCds] = useState({ Q: 0, W: 0, E: 0, R: 0, D: 0, F: 0 });
      const [projectiles, setProjectiles] = useState([]);
      const [dummies, setDummies] = useState([
        { id: 1, x: 300, y: 300, hp: 10 }, { id: 2, x: 1000, y: 200, hp: 10 }, { id: 3, x: 700, y: 500, hp: 10 }
      ]);
      const [score, setScore] = useState(0);
      const audioRef = useRef(null);

      const BUSHES = [{x: 200, y: 200, r: 100}, {x: 1100, y: 400, r: 130}];

      const selectHero = (p) => {
        setHero(p);
        const audio = new Audio(p.cry);
        audio.volume = 0.4;
        audio.play();
      };

      const handleMove = (e) => {
        const nx = e.clientX; const ny = e.clientY;
        setPos({ x: nx, y: ny });
        const hidden = BUSHES.some(b => Math.sqrt(Math.pow(nx - b.x, 2) + Math.pow(ny - b.y, 2)) < b.r);
        setIsStealth(hidden);
      };

      const fireProjectile = useCallback((type) => {
        const newProj = {
          id: Date.now(),
          x: pos.x,
          y: pos.y,
          vx: 15,
          range: type === 'R' ? 2000 : 600,
          dist: 0,
          type: type
        };
        setProjectiles(prev => [...prev, newProj]);
      }, [pos]);

      const useAbility = useCallback((k) => {
        const timers = { Q: 3, W: 5, E: 7, R: 30, D: 120, F: 100 };
        if (timers[k] && cds[k] === 0) {
          setCds(p => ({ ...p, [k]: timers[k] }));
          if (k === 'Q' || k === 'R') fireProjectile(k);
          if (k === 'W') { // Dash
             setPos(prev => ({ x: prev.x + 200, y: prev.y })); // 단순 구현
          }
        }
      }, [cds, fireProjectile]);

      useEffect(() => {
        const kd = (e) => useAbility(e.key.toUpperCase());
        window.addEventListener('keydown', kd);
        return () => window.removeEventListener('keydown', kd);
      }, [useAbility]);

      // Game Loop: Projectile Physics & Collision
      useEffect(() => {
        const loop = setInterval(() => {
          setProjectiles(prev => prev.map(p => ({ ...p, x: p.x + p.vx, dist: p.dist + p.vx })).filter(p => p.dist < p.range));
          
          // Collision Detection
          setDummies(prevD => prevD.map(d => {
            const hit = projectiles.some(p => Math.sqrt(Math.pow(p.x - d.x, 2) + Math.pow(p.y - d.y, 2)) < 40);
            if (hit) {
                setScore(s => s + 10);
                return { ...d, hit: true, hp: d.hp - 1 };
            }
            return { ...d, hit: false };
          }));

          setCds(prev => {
            const next = { ...prev };
            let updated = false;
            Object.keys(next).forEach(k => { if(next[k] > 0) { next[k] = Math.max(0, next[k] - 0.05); updated = true; } });
            return updated ? next : prev;
          });
        }, 50);
        return () => clearInterval(loop);
      }, [projectiles]);

      if (!hero) return (
        <div className="flex flex-col items-center justify-center min-h-screen p-8 bg-[#010a13] overflow-y-auto">
          <div className="text-center mb-10">
            <h1 className="text-6xl font-black anniversary-glow italic mb-4">30th ANNIVERSARY</h1>
            <p className="text-xs tracking-[0.5em] text-[#c89b3c] font-bold opacity-80">{SLOGAN}</p>
          </div>
          <div className="grid grid-cols-6 gap-4 max-w-6xl pb-20">
            {POKEMONS.map(p => (
              <div key={p.id} onClick={() => selectHero(p)} className="group cursor-pointer border border-[#1e2328] hover:border-[#c89b3c] bg-[#0a0e13] p-3 rounded transition-all">
                <img src={p.img} className="w-20 h-20 object-contain group-hover:scale-110 transition-transform" />
                <p className="text-center mt-2 text-[10px] font-black opacity-40 group-hover:opacity-100">{p.name.toUpperCase()}</p>
              </div>
            ))}
          </div>
        </div>
      );

      return (
        <div className="h-screen flex flex-col">
          <div className="map-arena" onClick={handleMove}>
            <div className="slogan-banner text-[#c89b3c]">{SLOGAN}</div>
            <div className="score-board">SCORE: {score}</div>
            <div className="absolute top-10 left-10">
                <h2 className="text-2xl font-black anniversary-glow italic uppercase">{hero.name} Arena</h2>
                <p className="text-[10px] text-[#5b5a56] font-bold mt-1">HOTKEYS: Q (SHOT) / W (DASH) / E (AoE) / R (ULT)</p>
            </div>

            {BUSHES.map((b, i) => <div key={i} className="bush" style={{ left: b.x-b.r, top: b.y-b.r, width: b.r*2, height: b.r*2 }} />)}
            
            {dummies.map(d => (
              <div key={d.id} className={`dummy ${d.hit ? 'hit' : ''}`} style={{ left: d.x, top: d.y }}>
                TARGET<br/>HP: {d.hp}
              </div>
            ))}

            {projectiles.map(p => (
              <div key={p.id} className="projectile" style={{ left: p.x, top: p.y, transform: p.type === 'R' ? 'scale(3)' : 'scale(1)' }} />
            ))}

            <div className={`champion ${isStealth ? 'stealth' : ''}`} style={{ left: pos.x, top: pos.y }}>
              <img src={hero.img} className="w-full h-full drop-shadow-[0_0_20px_rgba(200,155,60,0.6)]" />
              <div className="absolute -top-4 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-black border border-white/20"><div className="h-full bg-[#28ab44]" style={{width:'100%'}}/></div>
            </div>
          </div>

          <div className="hud">
            <div className="flex gap-3">
              {['Q', 'W', 'E', 'R'].map(k => (
                <div key={k} className="skill-slot">
                  <span className={`text-2xl font-black italic ${k==='R' ? 'text-white' : 'text-[#c89b3c]'}`}>{k}</span>
                  <span className="skill-key">{k==='R' ? 'ULTIMATE' : 'ABILITY'}</span>
                  {cds[k] > 0 && <div className="cd-overlay">{Math.ceil(cds[k])}</div>}
                </div>
              ))}
            </div>
            <div className="w-[2px] h-14 bg-[#32281e]" />
            <div className="flex gap-3">
              {['D', 'F'].map(k => (
                <div key={k} className="skill-slot border-[#005a82]">
                  <span className="text-2xl font-black italic text-white">{k}</span>
                  <span className="skill-key text-[#005a82]">SPELL</span>
                  {cds[k] > 0 && <div className="cd-overlay">{Math.ceil(cds[k])}</div>}
                </div>
              ))}
            </div>
            <div className="ml-10 flex flex-col items-center">
                <img src={BALLS.master} className="w-14 h-14" />
                <span className="text-[9px] font-black mt-1 text-[#5b5a56]">READY</span>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GameApp />);
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>POKÉMON ARENA: KINETIC SURVIVOR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <style>
    :root { --accent: #e8c547; --accent-2: #5ecfff; --danger: #ff4d6d; --bg: #060912; --text: #e8eef7; }
    html, body, * { cursor: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/master-ball.png'), crosshair !important; }
    body { background-color: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; margin: 0; overflow: hidden; user-select: none; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .accent-glow { background: linear-gradient(90deg, #e8c547, #fff4c0, #e8c547); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 14px rgba(232, 197, 71, 0.45)); }
    .map-arena { height: calc(100vh - 140px); background: radial-gradient(circle, #0a0f1c 0%, #060912 100%); position: relative; overflow: hidden; }
    .grid-floor { position: absolute; inset: 0; background-image: linear-gradient(rgba(94, 207, 255, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(94, 207, 255, 0.04) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
    .champion { position: absolute; width: 100px; height: 100px; transform: translate(-50%, -50%); z-index: 25; will-change: left, top; }
    .champion.invuln { filter: drop-shadow(0 0 25px #5ecfff); opacity: 0.7; }
    .projectile { position: absolute; width: 22px; height: 22px; border-radius: 50%; z-index: 15; transform: translate(-50%, -50%); pointer-events: none; }
    .enemy-projectile { position: absolute; width: 20px; height: 20px; border-radius: 50%; z-index: 14; transform: translate(-50%, -50%); pointer-events: none; }
    .waypoint { position: absolute; transform: translate(-50%, -50%); width: 30px; height: 30px; border: 3px solid #4ade80; border-radius: 50%; animation: waypoint-pulse 0.4s ease-out forwards; pointer-events: none; }
    @keyframes waypoint-pulse { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; } }
    .enemy { position: absolute; width: 70px; height: 70px; transform: translate(-50%, -50%); z-index: 10; will-change: left, top; pointer-events: none; }
    .enemy-hp-bar { position: absolute; top: -10px; left: 10%; width: 80%; height: 4px; background: #333; border-radius: 2px; }
    .enemy-hp-fill { height: 100%; background: #ff4d6d; border-radius: 2px; }
    .dmg-num { position: absolute; font-family: 'JetBrains Mono'; font-weight: 900; font-size: 20px; text-shadow: 0 3px 6px #000; animation: dmg-rise 0.8s ease-out forwards; z-index: 30; pointer-events: none; }
    @keyframes dmg-rise { 0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; } 100% { transform: translate(-50%, -180%) scale(0.9); opacity: 0; } }
    .hud { height: 140px; background: #0c1120; border-top: 1px solid #1a2138; display: flex; justify-content: center; align-items: center; gap: 32px; z-index: 100; position: relative; }
    .skill-slot { width: 72px; height: 72px; background: #060912; border: 1px solid #2a3354; border-radius: 6px; display: flex; align-items: center; justify-content: center; position: relative; }
    .skill-slot.ready { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.1); }
    .cd-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: 700; border-radius: 6px; }
    .hp-bar-outer { width: 360px; height: 22px; background: #060912; border: 1px solid #2a3354; border-radius: 4px; position: relative; overflow: hidden; }
    .hp-bar-inner { height: 100%; background: linear-gradient(90deg, #4ade80, #22c55e); transition: width 0.2s; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    const SLOGAN = "EVERY POKÉMON IS SOMEONE'S FAVORITE";

    const HEROES = [
      { id: 25, name: "Pikachu", arch: "Electric", color: "#fde047" },
      { id: 1, name: "Bulbasaur", arch: "Grass", color: "#4ade80" },
      { id: 4, name: "Charmander", arch: "Fire", color: "#fb923c" },
      { id: 7, name: "Squirtle", arch: "Water", color: "#38bdf8" },
      { id: 133, name: "Eevee", arch: "Normal", color: "#cbd5e1" },
      { id: 150, name: "Mewtwo", arch: "Psychic", color: "#e879f9" },
      { id: 6, name: "Charizard", arch: "Fire/Fly", color: "#fb923c" },
      { id: 9, name: "Blastoise", arch: "Water", color: "#38bdf8" },
      { id: 3, name: "Venusaur", arch: "Grass", color: "#4ade80" },
      { id: 448, name: "Lucario", arch: "Fight/Steel", color: "#f472b6" },
      { id: 94, name: "Gengar", arch: "Ghost", color: "#a78bfa" },
      { id: 143, name: "Snorlax", arch: "Normal", color: "#cbd5e1" },
      { id: 384, name: "Rayquaza", arch: "Dragon/Fly", color: "#f472b6" }
    ].map(p => ({ ...p, img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png`, cry: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/cries/latest/${p.id}.ogg` }));

    const WILD_POKEMONS = [
      { id: 19, name: 'Rattata', type: 'melee', hp: 80, speed: 4.2, damage: 15 },
      { id: 41, name: 'Zubat', type: 'ranged', hp: 60, speed: 3.0, damage: 10 },
      { id: 109, name: 'Koffing', type: 'ranged', hp: 140, speed: 2.2, damage: 18 }
    ].map(p => ({ ...p, img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png` }));

    const getSkillSet = (arch) => {
        const type = arch.split('/')[0];
        const base = { Q: { name: 'BOLT', cd: 1.0, color: '#fff', speed: 18, damage: 35 }, W: { name: 'DASH', cd: 4.0 }, E: { name: 'PULSE', cd: 6.0, radius: 200 }, R: { name: 'STORM', cd: 20.0 } };
        if (type === 'Electric') base.Q.color = '#fde047';
        if (type === 'Fire') { base.Q.color = '#fb923c'; base.Q.pierce = true; }
        if (type === 'Water') { base.Q.color = '#38bdf8'; base.Q.speed = 22; }
        return base;
    };

    const Game = () => {
      const [hero, setHero] = useState(null);
      const [phase, setPhase] = useState('select');
      const [pos, setPos] = useState({ x: 0, y: 0 });
      const [hp, setHp] = useState(100);
      const [score, setScore] = useState(0);
      const [enemies, setEnemies] = useState([]);
      const [projectiles, setProjectiles] = useState([]);
      const [enemyProjectiles, setEnemyProjectiles] = useState([]);
      const [cds, setCds] = useState({ Q: 0, W: 0, E: 0, R: 0, D: 0, F: 0 });
      const [effects, setEffects] = useState([]);
      const [dmgNumbers, setDmgNumbers] = useState([]);

      const stateRef = useRef({ pos: { x: 0, y: 0 }, target: { x: 0, y: 0 }, vel: { x: 0, y: 0 }, aim: { x: 1, y: 0 }, hp: 100, invuln: false, wave: 1 });
      const arenaRef = useRef(null);

      const startGame = (h) => {
        new Audio(h.cry).play().catch(()=>{});
        setHero(h); setHp(100); setScore(0); setEnemies([]); setProjectiles([]); setEnemyProjectiles([]); setPhase('playing');
        const w = window.innerWidth/2, h2 = window.innerHeight/2;
        setPos({ x: w, y: h2 }); stateRef.current.pos = { x: w, y: h2 }; stateRef.current.target = { x: w, y: h2 }; stateRef.current.hp = 100;
      };

      const onArenaClick = (e) => {
        const rect = arenaRef.current.getBoundingClientRect();
        const tx = e.clientX - rect.left, ty = e.clientY - rect.top;
        stateRef.current.target = { x: tx, y: ty };
        setEffects(prev => [...prev, { id: Math.random(), type: 'waypoint', x: tx, y: ty }]);
      };

      const castSkill = useCallback((k) => {
        if (cds[k] > 0 || phase !== 'playing') return;
        const p = stateRef.current.pos, a = stateRef.current.aim;
        const skills = getSkillSet(hero.arch);
        
        setCds(prev => ({ ...prev, [k]: (k==='D' ? 10 : k==='F' ? 15 : skills[k].cd) }));

        if (k === 'Q') {
          setProjectiles(prev => [...prev, { id: Math.random(), x: p.x, y: p.y, vx: a.x * skills.Q.speed, vy: a.y * skills.Q.speed, color: skills.Q.color, damage: skills.Q.damage, dist: 0, pierce: skills.Q.pierce, hitSet: [] }]);
        } else if (k === 'D') {
          const nx = p.x + a.x * 250, ny = p.y + a.y * 250;
          setPos({ x: nx, y: ny }); stateRef.current.pos = { x: nx, y: ny }; stateRef.current.target = { x: nx, y: ny };
        } else if (k === 'F') {
          setHp(prev => Math.min(100, prev + 40));
        } else if (k === 'R') {
          setEnemies(prev => prev.map(e => {
            const d = Math.hypot(p.x - e.x, p.y - e.y);
            const dmg = Math.max(20, Math.floor(300 - d * 0.4));
            return { ...e, hp: e.hp - dmg };
          }).filter(e => e.hp > 0));
        }
      }, [hero, cds, phase]);

      useEffect(() => {
        const handleMove = (e) => {
          if (!arenaRef.current) return;
          const rect = arenaRef.current.getBoundingClientRect();
          const dx = (e.clientX - rect.left) - stateRef.current.pos.x;
          const dy = (e.clientY - rect.top) - stateRef.current.pos.y;
          const d = Math.hypot(dx, dy) || 1;
          stateRef.current.aim = { x: dx/d, y: dy/d };
        };
        const handleKey = (e) => { const k = e.key.toUpperCase(); if (['Q','W','E','R','D','F'].includes(k)) castSkill(k); };
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('keydown', handleKey);
        return () => { window.removeEventListener('mousemove', handleMove); window.removeEventListener('keydown', handleKey); };
      }, [castSkill]);

      useEffect(() => {
        if (phase !== 'playing') return;
        const loop = setInterval(() => {
          const s = stateRef.current, p = s.pos, t = s.target;
          
          // Kinetic Movement ( 가속/관성 로직 )
          const dx = t.x - p.x, dy = t.y - p.y;
          const d = Math.hypot(dx, dy);
          if (d > 5) {
            const acc = 1.8, friction = 0.85;
            s.vel.x = (s.vel.x + (dx/d) * acc) * friction;
            s.vel.y = (s.vel.y + (dy/d) * acc) * friction;
          } else {
            s.vel.x *= 0.7; s.vel.y *= 0.7;
          }
          const nx = p.x + s.vel.x, ny = p.y + s.vel.y;
          setPos({ x: nx, y: ny }); s.pos = { x: nx, y: ny };

          // Projectiles & HP damage
          let damageTaken = 0;
          setProjectiles(prev => prev.map(pr => ({ ...pr, x: pr.x + pr.vx, y: pr.y + pr.vy, dist: pr.dist + 15 })).filter(pr => pr.dist < 800));
          
          setEnemies(prev => prev.map(e => {
            const edx = s.pos.x - e.x, edy = s.pos.y - e.y, ed = Math.hypot(edx, edy);
            const moveX = e.x + (edx/ed) * e.kind.speed + Math.sin(Date.now()/200) * 2;
            const moveY = e.y + (edy/ed) * e.kind.speed + Math.cos(Date.now()/200) * 2;
            if (ed < 45) damageTaken += (e.kind.damage / 10); // 프레임당 데미지 분산
            return { ...e, x: moveX, y: moveY };
          }));

          if (damageTaken > 0) setHp(prev => { const val = Math.max(0, prev - damageTaken); if(val<=0) setPhase('dead'); return val; });

          // Cooldowns
          setCds(prev => { const n = { ...prev }; let ch = false; Object.keys(n).forEach(k => { if(n[k]>0){ n[k]=Math.max(0, n[k]-0.05); ch=true; } }); return ch ? n : prev; });
        }, 50);
        return () => clearInterval(loop);
      }, [phase]);

      if (phase === 'select') return (
        <div className="min-h-screen bg-[#060912] p-10 flex flex-col items-center overflow-y-auto">
          <h1 className="text-6xl font-bold accent-glow mb-12">POKÉMON ARENA</h1>
          <div className="grid grid-cols-3 md:grid-cols-6 gap-4 max-w-6xl">
            {HEROES.map(h => (
              <div key={h.id} onClick={() => startGame(h)} className="hero-card border border-[#1a2138] bg-[#0c1120] p-4 rounded-md cursor-pointer hover:border-[#e8c547] transition-all">
                <img src={h.img} className="w-20 h-20 object-contain mb-2" />
                <div className="text-center text-xs font-bold uppercase">{h.name}</div>
              </div>
            ))}
          </div>
        </div>
      );

      return (
        <div className="h-screen flex flex-col">
          <div ref={arenaRef} className="map-arena" onClick={onArenaClick}>
            <div className="grid-floor" />
            <div className="absolute top-8 left-8 z-50 flex items-center gap-4">
              <div className="hp-bar-outer"><div className="hp-bar-inner" style={{ width: `${hp}%` }} /></div>
              <div className="mono text-2xl font-bold">{Math.ceil(hp)} HP</div>
            </div>
            {enemies.map(e => ( <div key={e.id} className="enemy" style={{ left: e.x, top: e.y }}><img src={e.kind.img} className="w-full h-full object-contain" /></div> ))}
            {projectiles.map(p => ( <div key={p.id} className="projectile" style={{ left: p.x, top: p.y, background: p.color, boxShadow: `0 0 15px ${p.color}` }} /> ))}
            {effects.filter(ef=>ef.type==='waypoint').map(ef => ( <div key={ef.id} className="waypoint" style={{ left: ef.x, top: ef.y }} /> ))}
            <div className="champion" style={{ left: pos.x, top: pos.y }}><img src={hero.img} className="w-full h-full object-contain" /><div className="champion-shadow" /></div>
          </div>
          <div className="hud">
            {['Q','W','E','R','D','F'].map(k => (
              <div key={k} className={`skill-slot ${cds[k]===0?'ready':''}`}>
                <span className="text-2xl font-bold">{k}</span>
                {cds[k] > 0 && <div className="cd-overlay">{cds[k].toFixed(1)}</div>}
              </div>
            ))}
          </div>
          {phase === 'dead' && <div className="gameover-overlay"><div className="gameover-card"><h1 className="text-5xl font-bold mb-8">GAME OVER</h1><button className="restart-btn" onClick={()=>setPhase('select')}>RETRY</button></div></div>}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Game />);
  </script>
</body>
</html>

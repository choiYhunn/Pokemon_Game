<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Partner Game - 30th Anniversary Ultimate Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #0d0d12; --text: #e0e0f0; --paper: #1a1a26;
      --accent: #8888aa; --shadow: rgba(0,0,0,0.8);
      --map-bg: #1e2923; --bush-color: #12351a;
    }
    body {
      background-color: var(--bg); color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      margin: 0; min-height: 100vh; overflow: hidden;
    }
    h1, h2, h3 { font-family: 'Fraunces', serif; }
    
    /* 30th Anniversary Neon Pulse */
    .anniversary-badge {
        background: linear-gradient(45deg, #fcd34d, #f59e0b);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.6));
        animation: neonPulse 2s infinite alternate;
    }
    @keyframes neonPulse {
        from { filter: drop-shadow(0 0 5px rgba(245, 158, 11, 0.4)); transform: scale(1); }
        to { filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.9)); transform: scale(1.05); }
    }

    /* Game Area Styles */
    .game-container { display: flex; flex-direction: column; height: 100vh; }
    .map-area { 
        flex-grow: 1; background-color: var(--map-bg); position: relative; 
        cursor: crosshair; overflow: hidden; border-bottom: 2px solid #444;
    }
    .bush {
        position: absolute; background-color: var(--bush-color); border-radius: 40% 60% 50% 50%;
        opacity: 0.7; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    .champion-sprite {
        position: absolute; width: 64px; height: 64px; transform: translate(-50%, -50%);
        transition: left 0.4s ease-out, top 0.4s ease-out, opacity 0.3s;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
    }
    .champion-stealth { opacity: 0.4; }

    /* HUD Styles */
    .hud-area {
        height: 120px; background-color: #050508; display: flex; 
        align-items: center; justify-content: center; gap: 40px;
    }
    .skill-group { display: flex; gap: 10px; }
    .skill-btn {
        width: 60px; height: 60px; background: #111; border: 2px solid #555;
        border-radius: 8px; position: relative; display: flex;
        align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem;
    }
    .spell-btn { border-color: #d4af37; }
    .cooldown-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); display: flex; align-items: center;
        justify-content: center; color: #fcd34d; font-size: 1.5rem; border-radius: 6px;
    }

    /* Grid for Champion Select */
    .intro-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px; justify-items: center; width: 100%; max-width: 1200px; margin: 0 auto;
    }
    .pokemon-card {
      padding: 15px; background: rgba(255, 255, 255, 0.03); border-radius: 16px;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s;
    }
    .pokemon-card:hover { background: rgba(255, 255, 255, 0.1); border-color: #fcd34d; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // [중요] 기존 파일의 BALLS 이미지와 POKEMONS 15종 배열 전체를 이곳에 복사해 넣으세요.
    // const BALLS = { ... };
    // const POKEMONS = [ { id: 1, name: "피카츄", img: "..." }, ... ];
    
    // 예시 데이터 (기존 데이터로 교체 필요)
    const POKEMONS = [
        { id: 1, name: "챔피언 1" }, { id: 2, name: "챔피언 2" } 
    ];

    // 부쉬(은신처) 데이터 매핑
    const BUSHES = [
      { x: 300, y: 200, width: 150, height: 120 },
      { x: 800, y: 500, width: 200, height: 140 },
      { x: 150, y: 600, width: 120, height: 120 }
    ];

    const MobaGame = () => {
      const [champion, setChampion] = useState(null);
      const [pos, setPos] = useState({ x: 500, y: 400 });
      const [inBush, setInBush] = useState(false);
      // 스킬(QWER) 및 스펠(DF) 쿨타임 상태 (초 단위)
      const [cooldowns, setCooldowns] = useState({ Q: 0, W: 0, E: 0, R: 0, D: 0, F: 0 });

      // 맵 이동 및 부쉬 은신 판정 로직
      const handleMapClick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const targetX = e.clientX - rect.left;
        const targetY = e.clientY - rect.top;
        setPos({ x: targetX, y: targetY });

        // 부쉬 충돌 판정 (간단한 박스/반경 기준)
        const hidden = BUSHES.some(b => 
            targetX > b.x - 30 && targetX < b.x + b.width + 30 &&
            targetY > b.y - 30 && targetY < b.y + b.height + 30
        );
        setInBush(hidden);
      };

      // 키보드 입력에 따른 스킬/스펠 트리거
      const handleKeyDown = useCallback((e) => {
        const key = e.key.toUpperCase();
        const cdTimes = { Q: 4, W: 8, E: 12, R: 60, D: 300, F: 240 }; // 각 스킬별 쿨타임 설정
        
        if (cdTimes[key] !== undefined && cooldowns[key] === 0) {
          setCooldowns(prev => ({ ...prev, [key]: cdTimes[key] }));
          // TODO: 여기에 투사체 생성이나 타겟팅 로직을 확장할 수 있습니다.
        }
      }, [cooldowns]);

      useEffect(() => {
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [handleKeyDown]);

      // 쿨타임 타이머 제어 (Tick 동기화)
      useEffect(() => {
        const timer = setInterval(() => {
          setCooldowns(prev => {
            const next = { ...prev };
            let hasChanges = false;
            Object.keys(next).forEach(k => {
              if (next[k] > 0) {
                next[k] -= 1;
                hasChanges = true;
              }
            });
            return hasChanges ? next : prev;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      // 1. 챔피언 선택 화면
      if (!champion) {
        return (
          <div className="p-10 text-center">
            <h1 className="text-5xl mb-4 anniversary-badge">30주년 얼티밋 에디션</h1>
            <p className="text-xl mb-10 opacity-80">원하는 챔피언을 선택하여 전장에 합류하세요.</p>
            <div className="intro-grid">
              {POKEMONS.map(poke => (
                <div key={poke.id} className="pokemon-card" onClick={() => setChampion(poke)}>
                  <div className="w-20 h-20 bg-gray-700 rounded-full mb-4 flex items-center justify-center">IMG</div>
                  <h3 className="font-bold">{poke.name}</h3>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // 2. 인게임 화면 (Map & HUD)
      return (
        <div className="game-container">
          <div className="map-area" onClick={handleMapClick}>
            {/* 부쉬 렌더링 */}
            {BUSHES.map((b, i) => (
              <div key={i} className="bush" style={{ left: b.x, top: b.y, width: b.width, height: b.height }} />
            ))}
            
            {/* 플레이어 챔피언 */}
            <div 
              className={`champion-sprite ${inBush ? 'champion-stealth' : ''}`}
              style={{ left: pos.x, top: pos.y }}
            >
              <div className="w-full h-full bg-blue-500 rounded-full border-2 border-white flex items-center justify-center text-xs">
                {champion.name}
              </div>
            </div>
          </div>

          <div className="hud-area">
            {/* 스킬 (Q, W, E, R) */}
            <div className="skill-group">
              {['Q', 'W', 'E', 'R'].map(key => (
                <div key={key} className="skill-btn">
                  {key}
                  {cooldowns[key] > 0 && <div className="cooldown-overlay">{cooldowns[key]}</div>}
                </div>
              ))}
            </div>
            {/* 스펠 (D, F) */}
            <div className="skill-group">
              {['D', 'F'].map(key => (
                <div key={key} className="skill-btn spell-btn">
                  {key}
                  {cooldowns[key] > 0 && <div className="cooldown-overlay">{cooldowns[key]}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MobaGame />);
  </script>
</body>
</html>

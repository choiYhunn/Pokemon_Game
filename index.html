<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>POKEMON ARENA: 30th ANNIVERSARY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;1,700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root { 
      --gold: #c89b3c; --blue: #005a82; --dark: #010a13; --text: #f0e6d2; --hp: #28ab44; 
    }
    /* 마우스 커서 몬스터볼 설정 */
    * { 
      cursor: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/master-ball.png'), auto !important; 
    }
    
    body { 
      background-color: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; 
      margin: 0; overflow: hidden; user-select: none; 
    }

    .anniversary-glow { 
      background: linear-gradient(to right, #c89b3c, #f0e6d2); 
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
      filter: drop-shadow(0 0 10px rgba(200, 155, 60, 0.5)); 
    }

    .map-arena { 
      height: calc(100vh - 160px); 
      background: radial-gradient(circle, #0f1217 0%, #010a13 100%); 
      position: relative; overflow: hidden; 
    }

    /* 부쉬(은신처) */
    .bush { 
      position: absolute; background: #05140a; border-radius: 50%; 
      filter: blur(30px); opacity: 0.6; pointer-events: none; z-index: 5; 
    }

    /* 챔피언 유닛 */
    .champion { 
      position: absolute; width: 100px; height: 100px; 
      transform: translate(-50%, -50%); 
      transition: left 0.3s ease-out, top 0.3s ease-out, opacity 0.3s; 
      z-index: 20; 
    }
    .stealth { opacity: 0.3; filter: brightness(0.4) saturate(0.5); }

    /* 투사체(Skill) */
    .projectile { 
      position: absolute; width: 25px; height: 25px; background: #fff; 
      border-radius: 50%; box-shadow: 0 0 20px #5ecfff; z-index: 15; 
    }

    /* 타겟 더미 */
    .dummy { 
      position: absolute; width: 70px; height: 70px; background: #1a1a1a; 
      border: 2px solid #333; border-radius: 12px; 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      z-index: 10; font-size: 10px; font-weight: bold; color: #666; 
      transition: transform 0.1s;
    }
    .dummy.hit { transform: scale(1.1); border-color: #ff4d4d; color: #ff4d4d; }

    /* HUD */
    .hud { 
      height: 160px; background: #010a13; border-top: 3px solid #1e2328; 
      display: flex; justify-content: center; align-items: center; gap: 40px; 
      position: relative; z-index: 100;
    }
    .skill-slot { 
      width: 75px; height: 75px; background: #010a13; border: 2px solid #5b5a56; 
      position: relative; display: flex; align-items: center; justify-content: center; 
    }
    .skill-key { position: absolute; bottom: -24px; font-size: 12px; font-weight: 900; color: #c89b3c; }
    .cd-overlay { 
      position: absolute; inset: 0; background: rgba(0,0,0,0.8); 
      display: flex; align-items: center; justify-content: center; 
      color: white; font-size: 24px; font-weight: 900; 
    }

    .slogan-banner { 
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%); 
      font-size: 12px; letter-spacing: 0.3em; color: var(--gold); 
      font-weight: 900; opacity: 0.8; text-align: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const SLOGAN = "EVERY POKÉMON IS SOMEONE'S FAVORITE";

    // [DATA] 기존 멤버 15종 복구 + 확장 멤버
    const POKEMONS = [
      { id: 25, name: "Pikachu" }, { id: 1, name: "Bulbasaur" }, { id: 4, name: "Charmander" },
      { id: 7, name: "Squirtle" }, { id: 133, name: "Eevee" }, { id: 152, name: "Chikorita" },
      { id: 155, name: "Cyndaquil" }, { id: 158, name: "Totodile" }, { id: 252, name: "Treecko" },
      { id: 255, name: "Torchic" }, { id: 258, name: "Mudkip" }, { id: 387, name: "Turtwig" },
      { id: 390, name: "Chimchar" }, { id: 393, name: "Piplup" }, { id: 150, name: "Mewtwo" },
      { id: 6, name: "Charizard" }, { id: 9, name: "Blastoise" }, { id: 3, name: "Venusaur" },
      { id: 448, name: "Lucario" }, { id: 94, name: "Gengar" }, { id: 143, name: "Snorlax" },
      { id: 149, name: "Dragonite" }, { id: 282, name: "Gardevoir" }, { id: 130, name: "Gyarados" },
      { id: 131, name: "Lapras" }, { id: 197, name: "Umbreon" }, { id: 384, name: "Rayquaza" },
      { id: 470, name: "Leafeon" }, { id: 471, name: "Glaceon" }, { id: 700, name: "Sylveon" }
    ].map(p => ({
        ...p,
        img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png`,
        cry: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/cries/latest/${p.id}.ogg`
    }));

    const GameApp = () => {
      const [hero, setHero] = useState(null);
      const [pos, setPos] = useState({ x: window.innerWidth/2, y: window.innerHeight/2 });
      const [isStealth, setIsStealth] = useState(false);
      const [cds, setCds] = useState({ Q: 0, W: 0, E: 0, R: 0, D: 0, F: 0 });
      const [projectiles, setProjectiles] = useState([]);
      const [score, setScore] = useState(0);
      const [dummies, setDummies] = useState([
        { id: 1, x: 400, y: 300, hp: 5 }, { id: 2, x: 1000, y: 200, hp: 5 }, { id: 3, x: 800, y: 550, hp: 5 }
      ]);

      const BUSHES = [{x: 200, y: 250, r: 120}, {x: 1100, y: 450, r: 150}];

      const selectHero = (p) => {
        const audio = new Audio(p.cry);
        audio.volume = 0.3;
        audio.play().catch(() => {}); // 브라우저 정책 대응
        setHero(p);
      };

      const handleArenaClick = (e) => {
        const nx = e.clientX;
        const ny = e.clientY;
        setPos({ x: nx, y: ny });
        
        // 부쉬 체크
        const inBush = BUSHES.some(b => Math.sqrt(Math.pow(nx - b.x, 2) + Math.pow(ny - b.y, 2)) < b.r);
        setIsStealth(inBush);
      };

      const castSkill = useCallback((k) => {
        const cooldownTimes = { Q: 3, W: 4, E: 6, R: 25, D: 120, F: 100 };
        if (cds[k] > 0) return;

        setCds(prev => ({ ...prev, [k]: cooldownTimes[k] }));

        if (k === 'Q') { // Bolt Projectile
          const newProj = { id: Date.now(), x: pos.x, y: pos.y, vx: 12, range: 700, dist: 0 };
          setProjectiles(prev => [...prev, newProj]);
        }
        if (k === 'W') { // Dash
           // 마우스 방향 대쉬 로직 (단순 구현)
           setPos(prev => ({ x: prev.x + 150, y: prev.y }));
        }
      }, [cds, pos]);

      useEffect(() => {
        const onKey = (e) => castSkill(e.key.toUpperCase());
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [castSkill]);

      // Game Loop (Physics & Cleanup)
      useEffect(() => {
        const timer = setInterval(() => {
          // Projectile Move
          setProjectiles(prev => prev
            .map(p => ({ ...p, x: p.x + p.vx, dist: p.dist + p.vx }))
            .filter(p => p.dist < p.range)
          );

          // Collision Detection
          setDummies(prevD => prevD.map(d => {
            const hit = projectiles.some(p => Math.sqrt(Math.pow(p.x - d.x, 2) + Math.pow(p.y - d.y, 2)) < 40);
            if (hit) {
              setScore(s => s + 50);
              return { ...d, hit: true, hp: d.hp - 1 };
            }
            return { ...d, hit: false };
          }));

          // Cooldown Update
          setCds(prev => {
            const next = { ...prev };
            let active = false;
            Object.keys(next).forEach(k => {
              if (next[k] > 0) {
                next[k] = Math.max(0, next[k] - 0.1);
                active = true;
              }
            });
            return active ? next : prev;
          });
        }, 100);
        return () => clearInterval(timer);
      }, [projectiles]);

      if (!hero) return (
        <div className="min-h-screen bg-[#010a13] p-10 flex flex-col items-center overflow-y-auto">
          <div className="text-center mb-12">
            <h1 className="text-6xl font-black anniversary-glow italic mb-4">30th ANNIVERSARY</h1>
            <p className="text-[10px] tracking-[0.5em] text-[#c89b3c] font-bold uppercase">{SLOGAN}</p>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 max-w-6xl w-full">
            {POKEMONS.map(p => (
              <div key={p.id} onClick={() => selectHero(p)} className="group cursor-pointer border border-[#1e2328] hover:border-[#c89b3c] bg-[#0a0e13] p-4 rounded-md transition-all flex flex-col items-center">
                <img src={p.img} className="w-24 h-24 object-contain group-hover:scale-110 transition-transform" />
                <span className="mt-3 text-[10px] font-black opacity-40 group-hover:opacity-100 uppercase tracking-tighter">{p.name}</span>
              </div>
            ))}
          </div>
        </div>
      );

      return (
        <div className="h-screen flex flex-col">
          <div className="map-arena" onClick={handleArenaClick}>
            <div className="slogan-banner">{SLOGAN}</div>
            
            <div className="absolute top-10 left-10 z-50">
              <h2 className="text-3xl font-black anniversary-glow italic uppercase tracking-tighter">{hero.name} Arena</h2>
              <div className="text-[#5b5a56] font-black text-xs mt-1">SCORE: {score}</div>
            </div>

            {BUSHES.map((b, i) => (
              <div key={i} className="bush" style={{ left: b.x-b.r, top: b.y-b.r, width: b.r*2, height: b.r*2 }} />
            ))}

            {dummies.map(d => (
              <div key={d.id} className={`dummy ${d.hit ? 'hit' : ''}`} style={{ left: d.x, top: d.y }}>
                <span className="opacity-40">TARGET</span>
                <span className="text-[12px] text-white">HP: {d.hp}</span>
              </div>
            ))}

            {projectiles.map(p => (
              <div key={p.id} className="projectile" style={{ left: p.x, top: p.y }} />
            ))}

            <div className={`champion ${isStealth ? 'stealth' : ''}`} style={{ left: pos.x, top: pos.y }}>
               <img src={hero.img} className="w-full h-full drop-shadow-[0_0_20px_rgba(200,155,60,0.6)]" />
               <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-black/80 px-3 border border-[#c89b3c]/40 rounded text-[9px] font-black">{hero.name.toUpperCase()}</div>
            </div>
          </div>

          <div className="hud">
            <div className="flex gap-4">
              {['Q', 'W', 'E', 'R'].map(k => (
                <div key={k} className="skill-slot border-[#32281e]">
                  <span className={`text-2xl font-black italic ${k==='R' ? 'text-white' : 'text-[#c89b3c]'}`}>{k}</span>
                  <span className="skill-key">{k==='R' ? 'ULT' : 'ABI'}</span>
                  {cds[k] > 0 && <div className="cd-overlay">{Math.ceil(cds[k])}</div>}
                </div>
              ))}
            </div>
            <div className="w-[2px] h-14 bg-[#1e2328]" />
            <div className="flex gap-4">
              {['D', 'F'].map(k => (
                <div key={k} className="skill-slot border-[#005a82]">
                  <span className="text-2xl font-black italic text-white">{k}</span>
                  <span className="skill-key text-[#005a82]">SPELL</span>
                  {cds[k] > 0 && <div className="cd-overlay">{Math.ceil(cds[k])}</div>}
                </div>
              ))}
            </div>
            <div className="flex flex-col items-center ml-10">
               <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/master-ball.png" className="w-14 h-14" />
               <span className="text-[8px] font-black text-[#5b5a56] mt-1">MASTER READY</span>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GameApp />);
  </script>
</body>
</html>
